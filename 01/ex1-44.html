<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>셀병합퀴즈</title>
    <style>
      table {
        width: 300px;
        margin: auto;
      }
      td,
      th {
        padding: 10px;
        text-align: center;
      }
      table,
      tr,
      td,
      th {
        border: 1px #333333 solid;
      }
    </style>
  </head>
  <body>
    <table>
      <thead>
        <tr>
          <th colspan="2">컴퓨터 그래픽스 기능사</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th rowspan="3">프로그램</th>
          <th>일러스트</th>
        </tr>
        <tr>
          <th>포토샵</th>
        </tr>
        <tr>
          <th>인디자인</th>
        </tr>
      </tbody>
    </table>
  </body>
</html>
