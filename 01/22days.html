<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>22일 과제</title>
    <style>
        /* 전체선택자랑 형제선택자를 못 쓰겠습니다... */
      body > h1 {
        background-color: antiquewhite;
      }
      #tea_1 {
        background-color: lightgrey;
      }
      #tea_1 p span {
        color: blue;
      }
      h3 + p {
        color: green;
      }
      #tea_1 h2,
      .tea_2 span,
      .tea_3 span,
      .tea_4 span {
        color: red;
      }
      .tea_2 {
        background-color: antiquewhite;
      }
      .tea_4 {background-color: white;}
    </style>
  </head>
  <body>
    <h1>건강한 하루</h1>
    <div id="tea_1">
      <h2>건강해지는 차</h2>
      <p>
        머리와 피부에 좋은 차는 어떤 것들일까. <span>차의 종류</span> 에 대해
        알아보도록 합니다
      </p>
      <ul>
        <li class="tea_2">
          <h3>대나무차 <span>15,000원</span></h3>
          <p>얼굴에 물을 주는 효과가 있다.</p>
        </li>
        <li class="tea_3">
          <h3>감잎차 <span>14,000원</span></h3>
          <p>빈혈있는 사람에게 효과가 있다.</p>
        </li>
        <li class="tea_4">
          <h3>결명자차 <span>20,000원</span></h3>
          <p>
            눈을 밝혀주는 효과가 있다. 보리차와 비슷하나 맛이 더 은은하고
            구수하다.
          </p>
        </li>
      </ul>
    </div>
  </body>
</html>
