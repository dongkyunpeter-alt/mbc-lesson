<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button class="alert">click</button>
    <script>
      document.querySelector(".alert").onclick = function () {
        window.alert("Hi");
      };
    </script>
    <hr />
    <button class="prompt">prompt</button>
    <script>
      document.querySelector(".prompt").onclick = function () {
        let a = prompt("입력하세요");
        console.log(a);
        document.write(a);
      };
    </script>
    <hr />
    <button class="write">write</button>
    <script>
      document.querySelector(".write").onclick = function () {
        let a = document.write(`<h1>동대문</h1><h2>DDP</h2>`);
      };
    </script>
    <hr />
    <button class="log">log</button>
    <script>
      document.querySelector(".log").onclick = function () {
        let a;
        a = console.log("출력해봐요");
      };
    </script>
  </body>
</html>
