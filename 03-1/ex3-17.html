<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>조건부연산자(삼항연산자)</title>
  </head>
  <body>
    <script>
      const now = new Date().getHours() - 4;
      //   document.write(now.toLocaleTimeString());
      //   console.log(now);
      //   document.write(`<hr>${now.getHours()}`);
      now < 18 ? (document.querySelector(`body`).style.background = "yellow") : (document.querySelector(`body`).style.background = "black");
      now > 7 ? (document.querySelector(`body`).style.background = "yellow") : (document.querySelector(`body`).style.background = "black");
    </script>
  </body>
</html>
