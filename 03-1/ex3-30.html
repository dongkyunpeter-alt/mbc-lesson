    <title>Document</title>

  <body>
    <script>
      //함수의 선언
      function 믹서기() {
        //기능, 실행문
        console.log("메론" + "바나나");
      }
      //함수의 호출
      믹서기();
      믹서기();
      믹서기();
    </script>

    <script>
      function 세탁기(옷1, 옷2) {
        console.log(`★${옷1 + 옷2}`);
      }
      세탁기("상의", "바지");
      세탁기("셔츠", "가방");
      세탁기("잠옷", "신발");
    </script>
  </body>
