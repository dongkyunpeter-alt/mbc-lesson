<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>2단</h2>
    <script>
      for (let i = 1; i <= 9; i++) {
        document.write(`2X${i}=${2*i}<br>`);
      }
      document.write(`<h2>3단</h2>`)
      for (let i = 1; i <= 9; i++) {
        document.write(`3X${i}=${3*i}<br>`);
      }
    </script>
  </body>
</html>
