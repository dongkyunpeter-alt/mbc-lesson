<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>신장(cm): <input type="number" name="height" id="height" /></p>
    <p>몸무게(kg): <input type="number" name="weight" id="weight" /></p>
    <button onclick="check()">결과</button>
    <hr />
    <p id="result"></p>
    <script>
      /*     function check() {
         const h = height.value;
         const w = weight.value;
         const ideal = (h - 100) * 0.9;
         result.textContent = w >= ideal ? "정상 이상" : "정상 이하";
       } */
      function check() {
        const h = height.value;
        const w = weight.value;
        const ideal = (h - 100) * 0.9;
        if (w > ideal) {
          result.textContent = "정상 이상";
        }
        if (w == ideal) {
          result.textContent = "정상";
        }
        if (w < ideal) {
          result.textContent = "정상 이하";
        }
      }
    </script>
  </body>
</html>
