<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let gender = prompt("성별을 입력하세요(남/여)");
      let age = prompt("나이를 입력하세요");
      let result = age >= 20 && age < 30 && gender === "여";
      document.write(result);
    </script>
  </body>
