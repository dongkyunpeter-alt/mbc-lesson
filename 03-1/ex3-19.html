<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>제어문_조건문</title>
  </head>
  <body>
    <script>
      let your_sex = prompt("성별 입력", "남성,여성");
      if (your_sex == "남성") {
        document.write("네 이름은 철수야 맞지?");
      }
      if (your_sex == "여성") {
        document.write("네 이름은 영희야 맞지?");
      }
      document.write("??");
    </script>
  </body>
</html>
