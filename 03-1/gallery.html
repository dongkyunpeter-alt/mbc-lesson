<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .galleryWrap * {
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div class="galleryWrap">
      <h1>이미지 넘기기</h1>
      <a href="#" onclick="prev()">&lt;</a>
      <img src="img/img1.jpg" alt="" width="300" height="200" id="pic" />
      <a href="#" onclick="next()">&gt;</a>
    </div>
    <script>
      let num = 1;
      function prev() {
        // console.log("click");
        // document.body.style.background = "gray";
        // document.querySelector("h1").style.color = "green";
        num--;
        if (num < 1) {
          num = 7;
          //   alert("이미지 없음");
          //   return;
        }
        let a = document.querySelector("#pic");
        console.log(a.src);
        a.src = `img/img${num}.jpg`;
      }

      function next() {
        num++;
        if (num > 7) {
          num = 1;
        }
        // let a = document.querySelector("#pic");
        console.log(a.src);
        a.src = `img/img${num}.jpg`;
      }
    </script>
  </body>
</html>
