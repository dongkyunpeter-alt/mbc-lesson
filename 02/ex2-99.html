<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>animation</title>
    <style>
      .heart {
        font-size: 100px;
        color: pink;
        text-align: center;
        animation-name: beat;
        animation-duration: 1.25s;
        animation-iteration-count: infinite;
        animation-fill-mode: forwards;
        animation-direction: alternate;
        animation-timing-function: cubic-bezier(0.78, -0.04, 0.38, 1.4);
        animation-play-state: paused;
        user-select: none;
      }
      .heart:hover {
        animation-play-state: running;
      }
      @keyframes beat {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.3);
        }
        100% {
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="heart">❤</div>
  </body>
</html>
