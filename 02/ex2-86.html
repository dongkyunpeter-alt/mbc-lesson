<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSS Grid Layout</title>
    <style>
      .gallery {
        width: 700px;
        margin: 20px auto;
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 180px);
        grid-template-areas:
          "p1 p1 p2"
          "p1 p1 p3"
          "p4 p5 p6";
      }
      .photo1 {
        grid-area: p1;
      }
      .gallery img {
        width: 100%;
        height: 100%;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="gallery">
      <img class="photo1" src="https://placedog.net/640/480?id=2" alt="따뜻한 차가 있는 겨울 풍경" />
      <img class="photo2" src="https://placedog.net/640/480?id=100" alt="남극 펭귄" />
      <img class="photo3" src="https://placedog.net/640/480?id=12" alt="눈이 가득 쌓인 시골 풍경" />
      <img class="photo4" src="https://placedog.net/640/480?id-65" alt="오로라가 보이는 밤 풍경" />
      <img class="photo5" src="https://placedog.net/640/480?r" alt="눈 쌓인 배경" />
      <img class="photo6" src="https://placedog.net/640/480?random" alt="나뭇가지에 앉아있는 빨간 새" />
    </div>
  </body>
</html>
