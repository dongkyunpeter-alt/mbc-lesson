<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>transition</title>
    <style>
      .item {
        width: 200px;
        height: 100px;
        background: url(imgs/bg_flower.png);
        color: white;
        text-align: center;
        line-height: 100px;
        cursor: pointer;
        /* transition: ease .3s; */
        transition-property: transform;
        transition-duration: 1s;
        transition-timing-function: cubic-bezier(0.8, -0.4, 0.5, 1);
      }
      .item:hover {
        transform: scale(1.2);
      }
      .drop {
        width: 100px;
        height: 100px;
        background: url(imgs/bg_grid.gif);
        /* display: none; */
        opacity: 0;
        transition-property: opacity;
        transition-duration: 2s;
      }
      .item:hover + .drop {
        /* display: block; */
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item">Hover Me</div>
      <div class="drop"></div>
    </div>
  </body>
</html>
