<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>grid 영역 배치</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      header,
      nav,
      main,
      footer {
        padding: 20px;
      }
      header {
        background: #f99;
        grid-area: header;
      }
      nav {
        background: #9f9;
        grid-area: nav;
      }
      main {
        background: #99f;
        grid-area: main;
      }
      footer {
        background: #ff9;
        grid-area: footer;
      }
      .grid-layout {
        display: grid;
        min-height: 300px;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: auto 1fr auto;
        gap: 10px;
        grid-template-areas: 
        "header header header"
        "nav main main"
        "footer footer footer";
      }
    </style>
  </head>
  <body>
    <div class="grid-layout">
      <header>Header</header>
      <nav>Nav</nav>
      <main>Main</main>
      <footer>Footer</footer>
    </div>
  </body>
</html>
