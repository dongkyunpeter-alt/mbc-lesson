<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>transform_2D</title>
    <style>
      .box,
      .box1,
      .box2 {
        width: 100px;
        height: 100px;
        background: orange;
        margin: 50px;
        transition-duration: 0.5s;
        transition-property: transform;
        transition-timing-function: ease;
      }
      .box:hover {
        transform: translate(50px, 50px) rotate(180deg) scale(150%);
      }
      .box1 {
        overflow: hidden;
        position: relative;
      }
      .box1:hover::after {
        width: 100%;
      }
      /* .box1::before, */
      .box1::after {
        position: absolute;
        left: 50px;
        top: calc(100% - 5px);
        content: "";
        /* display: block; */
        width: 0;
        height: 5px;
        background: red;
        transform: translate(-50%, 0);
        transition: width 0.5s;
      }
      .box1::before {
        position: absolute;
        content: "";
        background-color: rgba(0, 0, 0, 0.253);
        backdrop-filter: blur(1.5px);
        width: 100%;
        height: 100%;
        border-radius: 50%;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) scale(0);
        z-index: 1;
        transition: all ease 0.5s;
      }
      .box1:hover::before {
        transform: translate(-50%, -50%) scale(1.5);
      }
      .box2 {
        transform: skewX(15deg) skewY(35deg) skew(15deg, 35deg);
      }
    </style>
  </head>
  <body>
    <div class="box">2D Transform</div>
    <div class="box1">2D Transform</div>
    <div class="box2">2D Transform</div>
  </body>
</html>
